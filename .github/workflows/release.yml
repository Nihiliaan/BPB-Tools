name: Release Build

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签（如 v1.0.0）时触发

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            extension: .exe
          - goos: windows
            goarch: arm64
            extension: .exe
          - goos: linux
            goarch: amd64
            extension: ""
          - goos: darwin
            goarch: amd64
            extension: ""
          - goos: darwin
            goarch: arm64
            extension: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # 匹配 go.mod 中的版本

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="BPB-Tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}"
          go build -trimpath -ldflags="-s -w" -o "$BINARY_NAME" .

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: BPB-Tools-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
