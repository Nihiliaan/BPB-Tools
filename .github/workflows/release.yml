name: Release Build

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签（如 v1.0.0）时触发

jobs:
  build:
    name: Build Windows Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            extension: .exe
          - goos: windows
            goarch: arm64
            extension: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="BPB-Tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}"
          go build -trimpath -ldflags="-s -w" -o "$BINARY_NAME" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BPB-Tools-${{ matrix.goos }}-${{ matrix.goarch }}
          path: BPB-Tools-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: BPB-Tools-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
